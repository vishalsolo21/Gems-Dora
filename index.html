<!DOCTYPE html>
<html>
<head>
  <title>JioMart Deals</title>
</head>
<body style="background:#0f172a;color:white;text-align:center;font-family:Arial">

<h2>🔥 60%+ Deals</h2>

<input id="pin" placeholder="Enter Pincode">
<button onclick="start()">Search</button>

<div id="grid"></div>
<p id="loading">Scroll to load more...</p>

<script>
let page = 1;
let loading = false;

async function loadDeals() {
  if (loading) return;
  loading = true;

  document.getElementById("loading").innerText = "Loading...";

  try {
    const res = await fetch(`/api/deals?page=${page}`);
    const data = await res.json();

    if (!data.deals || data.deals.length === 0) {
      document.getElementById("loading").innerText = "No more deals";
      return;
    }

    data.deals.forEach(p => {
      document.getElementById("grid").innerHTML += `
        <div style="background:#1e293b;margin:10px;padding:10px;border-radius:10px">
          <a href="${p.link}" target="_blank">
            <img src="${p.image}" width="150"><br>
            ${p.name}
          </a>
          <p>₹${p.price} <del>₹${p.mrp}</del></p>
          <p style="color:lime">${p.discount}% OFF</p>
        </div>
      `;
    });

    page = data.nextPage;
    loading = false;
    document.getElementById("loading").innerText = "Scroll to load more...";

  } catch (e) {
    document.getElementById("loading").innerText = "Error loading deals";
    loading = false;
  }
}

function start() {
  document.getElementById("grid").innerHTML = "";
  page = 1;
  loadDeals();
}

window.onscroll = () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
    loadDeals();
  }
};
</script>

</body>
</html>
