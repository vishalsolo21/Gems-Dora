<!DOCTYPE html>
<html>
<head>
  <title>JioMart Deals</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    input, button {
      padding: 10px;
      margin: 10px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>🔥 60%+ Deals</h2>

<input id="pin" placeholder="Enter Pincode">
<button onclick="start()">Search</button>

<div id="grid"></div>
<p id="loading">Scroll to load more...</p>

<script>
let page = 1;
let loading = false;

async function loadDeals() {
  if (loading) return;
  loading = true;

  document.getElementById("loading").innerText = "Loading...";

  const res = await fetch(`/api/deals?page=${page}`);
  const data = await res.json();

  data.deals.forEach(p => {
    document.getElementById("grid").innerHTML += `
      <div class="card">
        <a href="${p.link}" target="_blank">
          <img src="${p.image}">
          <h4>${p.name}</h4>
        </a>
        <p>₹${p.price} <del>₹${p.mrp}</del></p>
        <p style="color:lime">${p.discount}% OFF</p>
      </div>
    `;
  });

  page = data.nextPage;
  loading = false;
  document.getElementById("loading").innerText = "Scroll to load more...";
}

function start() {
  document.getElementById("grid").innerHTML = "";
  page = 1;
  loadDeals();
}

window.onscroll = () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
    loadDeals();
  }
};
</script>

</body>
</html>
